version: '3.8'

services:
  web:
    build: .
    container_name: spool_tracker
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - DATABASE_URI=sqlite:////app/instance/spool_tracker.db
    volumes:
      # Persist database across container restarts
      - ./instance:/app/instance
      # Persist migrations
      - ./migrations:/app/migrations
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/auth/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

